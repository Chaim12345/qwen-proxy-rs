name: CI

on:
  push:
    branches: [ "main", "**" ]
  pull_request:
    branches: [ "main", "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run Clippy
      run: cargo clippy --all-targets -- -D warnings

    - name: Build debug
      run: cargo build

    - name: Run tests
      run: cargo test -- --nocapture

  build-release:
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - aarch64-linux-android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - uses: Swatinem/rust-cache@v2

    - name: Install cross-compilation deps (aarch64-linux-gnu)
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

    - name: Install Android NDK
      if: matrix.target == 'aarch64-linux-android'
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r26d
        add-to-path: false

    - name: Configure Android linker
      if: matrix.target == 'aarch64-linux-android'
      run: |
        NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
        TOOLCHAIN=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/bin/aarch64-linux-android30-clang" >> $GITHUB_ENV
        echo "CC_aarch64_linux_android=$TOOLCHAIN/bin/aarch64-linux-android30-clang" >> $GITHUB_ENV
        echo "AR_aarch64_linux_android=$TOOLCHAIN/bin/llvm-ar" >> $GITHUB_ENV

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: qwen-proxy-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/qwen-proxy
